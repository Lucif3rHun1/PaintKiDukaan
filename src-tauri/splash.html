<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PaintKiDukaan Update</title>
  <style>
    :root {
      --background: 222.2 84% 4.9%;
      --foreground: 210 40% 98%;
      --card: 222.2 84% 8%;
      --card-foreground: 210 40% 98%;
      --primary: 217.2 91.2% 59.8%;
      --primary-foreground: 222.2 47.4% 11.2%;
      --secondary: 217.2 32.6% 17.5%;
      --secondary-foreground: 210 40% 98%;
      --muted: 217.2 32.6% 17.5%;
      --muted-foreground: 215 20.2% 65.1%;
      --destructive: 0 72% 51%;
      --destructive-foreground: 210 40% 98%;
      --warning: 38 92% 50%;
      --border: 217.2 32.6% 17.5%;
      --ring: 224.3 76.3% 48%;
      --radius: 0.5rem;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, hsl(var(--primary) / 0.16), transparent 30%),
        radial-gradient(circle at 82% 72%, hsl(var(--warning) / 0.12), transparent 28%),
        hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      display: grid;
      place-items: center;
    }

    .shell {
      width: 480px;
      height: 320px;
      display: grid;
      grid-template-columns: 168px 1fr;
      gap: 24px;
      padding: 28px;
      border: 1px solid hsl(var(--border));
      border-radius: calc(var(--radius) * 2);
      background: hsl(var(--card) / 0.92);
      box-shadow: 0 24px 80px hsl(222.2 84% 2% / 0.56);
    }

    .mark {
      display: grid;
      place-items: center;
      border-radius: calc(var(--radius) * 1.5);
      background: hsl(var(--secondary) / 0.76);
      border: 1px solid hsl(var(--border));
      overflow: hidden;
    }

    svg { width: 148px; height: 192px; }

    .paint-drop { animation: drop 1.6s ease-in-out infinite; transform-origin: center; }
    .roller { animation: roll 1.8s ease-in-out infinite; transform-origin: 82px 70px; }
    .brush { animation: brush 2s ease-in-out infinite; transform-origin: 112px 116px; }
    .trowel { animation: trowel 2.2s ease-in-out infinite; transform-origin: 52px 134px; }
    .brick { animation: brick 1.9s ease-in-out infinite; transform-origin: center; }
    .spinner { animation: spin 1s linear infinite; transform-origin: center; }

    .content {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      margin: 0;
      color: hsl(var(--card-foreground));
      font-size: 24px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .caption {
      margin: 8px 0 20px;
      color: hsl(var(--muted-foreground));
      font-size: 12px;
      line-height: 1.5;
    }

    .state { display: none; }
    body[data-state="checking"] #checking-state,
    body[data-state="progress"] #progress-state,
    body[data-state="error"] #error-state { display: block; }

    .status-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: hsl(var(--foreground));
      font-size: 14px;
      font-weight: 600;
    }

    .status-line svg { width: 18px; height: 18px; flex: none; }

    .progress-track {
      height: 10px;
      margin: 10px 0 8px;
      overflow: hidden;
      border: 1px solid hsl(var(--border));
      border-radius: 999px;
      background: hsl(var(--muted));
    }

    .progress-fill {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, hsl(var(--primary)), hsl(var(--warning)));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 220ms ease;
    }

    .counts {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: hsl(var(--muted-foreground));
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .error-box {
      margin: 0 0 14px;
      padding: 12px;
      border: 1px solid hsl(var(--destructive) / 0.3);
      border-radius: var(--radius);
      background: hsl(var(--destructive) / 0.1);
      color: hsl(var(--destructive-foreground));
      font-size: 12px;
      line-height: 1.45;
    }

    .actions { display: flex; gap: 10px; }

    button {
      min-width: 72px;
      height: 36px;
      border: 1px solid hsl(var(--border));
      border-radius: var(--radius);
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
      font: inherit;
      font-size: 13px;
      font-weight: 650;
      cursor: pointer;
      transition: background-color 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    button:first-child {
      border-color: hsl(var(--primary));
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
    }

    button:hover { transform: translateY(-1px); }
    button:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes drop { 50% { transform: translateY(8px); opacity: 0.62; } }
    @keyframes roll { 50% { transform: translateX(8px) rotate(8deg); } }
    @keyframes brush { 50% { transform: rotate(-9deg) translateY(4px); } }
    @keyframes trowel { 50% { transform: rotate(8deg) translateX(-4px); } }
    @keyframes brick { 50% { transform: translateY(-4px); } }

    @media (prefers-reduced-motion: reduce) {
      .paint-drop, .roller, .brush, .trowel, .brick, .spinner { animation: none; }
      button, .progress-fill { transition: none; }
    }
  </style>
</head>
<body data-state="checking">
  <main class="shell" aria-live="polite">
    <section class="mark" aria-hidden="true">
      <svg viewBox="0 0 148 192" role="img">
        <title>Paint and building tools</title>
        <defs>
          <linearGradient id="paint" x1="18" x2="126" y1="36" y2="156" gradientUnits="userSpaceOnUse">
            <stop stop-color="hsl(217.2 91.2% 59.8%)" />
            <stop offset="1" stop-color="hsl(38 92% 50%)" />
          </linearGradient>
        </defs>
        <rect x="16" y="142" width="30" height="18" rx="3" fill="hsl(217.2 32.6% 17.5%)" stroke="hsl(217.2 32.6% 24%)" />
        <rect class="brick" x="48" y="142" width="30" height="18" rx="3" fill="hsl(38 92% 50% / 0.72)" />
        <rect x="80" y="142" width="30" height="18" rx="3" fill="hsl(217.2 32.6% 17.5%)" stroke="hsl(217.2 32.6% 24%)" />
        <path class="trowel" d="M30 128l33 21 34-44-42 16z" fill="hsl(210 40% 98% / 0.74)" stroke="hsl(215 20.2% 65.1%)" stroke-width="2" />
        <path d="M24 126l-11-7" stroke="hsl(38 92% 50%)" stroke-width="6" stroke-linecap="round" />
        <path class="roller" d="M34 54h58a11 11 0 010 22H34a11 11 0 010-22z" fill="url(#paint)" />
        <path d="M92 65h20c9 0 15 6 15 15v18" fill="none" stroke="hsl(210 40% 98% / 0.8)" stroke-width="5" stroke-linecap="round" />
        <rect x="121" y="96" width="10" height="34" rx="5" fill="hsl(38 92% 50%)" />
        <path d="M40 78h50l-7 52H47z" fill="hsl(217.2 32.6% 17.5%)" stroke="hsl(217.2 32.6% 24%)" stroke-width="3" />
        <path d="M47 80h36l-5 16H52z" fill="url(#paint)" />
        <path class="paint-drop" d="M69 95c7 10 12 17 12 25a12 12 0 01-24 0c0-8 5-15 12-25z" fill="hsl(217.2 91.2% 59.8% / 0.9)" />
        <g class="brush">
          <path d="M99 118l20 33" stroke="hsl(38 92% 50%)" stroke-width="7" stroke-linecap="round" />
          <path d="M89 103l15 24 15-9-16-23z" fill="hsl(210 40% 98% / 0.72)" />
          <path d="M83 93l12 17 16-10-13-17z" fill="hsl(217.2 91.2% 59.8%)" />
        </g>
      </svg>
    </section>

    <section class="content">
      <h1 class="brand">PaintKiDukaan</h1>
      <p class="caption">Updating shop inventory, billing, and backup tools before launch.</p>

      <div id="checking-state" class="state">
        <div class="status-line">
          <svg class="spinner" viewBox="0 0 24 24" role="img" aria-label="Checking updates">
            <title>Checking updates</title>
            <circle cx="12" cy="12" r="9" fill="none" stroke="hsl(217.2 32.6% 17.5%)" stroke-width="4" />
            <path d="M21 12a9 9 0 00-9-9" fill="none" stroke="hsl(217.2 91.2% 59.8%)" stroke-linecap="round" stroke-width="4" />
          </svg>
          <span>Checking for updates...</span>
        </div>
      </div>

      <div id="progress-state" class="state">
        <div class="status-line"><span id="progress-stage">Downloading update</span></div>
        <div class="progress-track" aria-label="Update download progress">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="counts">
          <span id="downloaded-bytes">0 B</span>
          <span id="total-bytes">0 B</span>
        </div>
      </div>

      <div id="error-state" class="state">
        <p id="error-message" class="error-box">Update failed. Check your connection and try again.</p>
        <div class="actions">
          <button id="retry-button" type="button">Retry</button>
          <button id="quit-button" type="button">Quit</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      var progressFill = document.getElementById("progress-fill");
      var progressStage = document.getElementById("progress-stage");
      var downloadedBytes = document.getElementById("downloaded-bytes");
      var totalBytes = document.getElementById("total-bytes");
      var errorMessage = document.getElementById("error-message");

      function invoke(command) {
        return window.__TAURI_INTERNALS__.invoke(command);
      }

      function setState(state) {
        document.body.setAttribute("data-state", state);
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";
        var units = ["B", "KB", "MB", "GB"];
        var value = bytes;
        var unit = 0;
        while (value >= 1024 && unit < units.length - 1) {
          value = value / 1024;
          unit += 1;
        }
        return `${unit === 0 ? value : value.toFixed(1)} ${units[unit]}`;
      }

      window.__updateProgress = (payload) => {
        var data = payload || {};
        var downloaded = Number(data.downloaded) || 0;
        var total = Number(data.total) || 0;
        var ratio = total > 0 ? Math.min(Math.max(downloaded / total, 0), 1) : 0;

        setState(data.stage === "checking" ? "checking" : "progress");
        progressFill.style.transform = `scaleX(${ratio})`;
        progressStage.textContent = data.stage === "installing" ? "Installing update" : "Downloading update";
        downloadedBytes.textContent = formatBytes(downloaded);
        totalBytes.textContent = total > 0 ? formatBytes(total) : "Calculating...";
      };

      window.__showError = (message) => {
        setState("error");
        errorMessage.textContent = message || "Update failed. Check your connection and try again.";
      };

      document.getElementById("retry-button").addEventListener("click", () => {
        invoke("retry_update");
      });
      document.getElementById("quit-button").addEventListener("click", () => {
        invoke("quit_app");
      });
    })();
  </script>
</body>
</html>
