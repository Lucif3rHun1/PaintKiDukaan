<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaintKiDukaan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #18181b;
            color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo span { color: #a1a1aa; }
        .version {
            font-size: 13px;
            color: #71717a;
            margin-top: -16px;
        }
        .status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #27272a;
            border-top-color: #3f3f46;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text {
            font-size: 14px;
            color: #a1a1aa;
        }
        .error-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .error-icon {
            width: 48px;
            height: 48px;
            background: #27272a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .error-text {
            font-size: 14px;
            color: #a1a1aa;
            text-align: center;
            max-width: 320px;
            line-height: 1.5;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        button {
            -webkit-app-region: no-drag;
            padding: 8px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-retry {
            background: #27272a;
            color: #fafafa;
        }
        .btn-retry:hover { background: #3f3f46; }
        .btn-quit {
            background: transparent;
            color: #71717a;
        }
        .btn-quit:hover { color: #a1a1aa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">PaintKi<span>Dukaan</span></div>
        <div class="version">v<span id="version">...</span></div>
        <div class="status" id="status">
            <div class="spinner"></div>
            <div class="status-text" id="status-text">Checking for updates...</div>
        </div>
        <div class="error-container" id="error">
            <div class="error-icon">⚠</div>
            <div class="error-text" id="error-text"></div>
            <div class="buttons">
                <button class="btn-retry" onclick="window.__retry()">Retry</button>
                <button class="btn-quit" onclick="window.__quit()">Quit</button>
            </div>
        </div>
    </div>
    <script>
        // Exposed to Rust via eval
        window.__setVersion = (v) => { document.getElementById('version').textContent = v; };
        window.__showChecking = () => {
            document.getElementById('status').style.display = 'flex';
            document.getElementById('error').style.display = 'none';
            document.getElementById('status-text').textContent = 'Checking for updates...';
        };
        window.__showDownloading = () => {
            document.getElementById('status-text').textContent = 'Downloading update...';
        };
        window.__showInstalling = () => {
            document.getElementById('status-text').textContent = 'Installing update...';
        };
        window.__showError = (msg) => {
            document.getElementById('status').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
            document.getElementById('error-text').textContent = msg;
        };
        // These will be wired by Rust to Tauri commands
        window.__retry = () => {};
        window.__quit = () => {};
    </script>
</body>
</html>
