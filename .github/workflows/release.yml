name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # required for SignPath OIDC signing

jobs:
  build:
    name: build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            openssl_triplet: x64-windows
            asset_glob: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            openssl_triplet: arm64-windows
            asset_glob: target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: windows-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_glob: target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_glob: target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install openssl:${{ matrix.openssl_triplet }}
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\${{ matrix.openssl_triplet }}" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          # Windows code-signing (optional — only active when secrets are set)
          TAURI_WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          TAURI_WINDOWS_PRIVATE_KEY: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          TAURI_WINDOWS_PRIVATE_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: List bundle outputs (debug)
        shell: bash
        run: find target/${{ matrix.target }}/release/bundle -type f | sort || true

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ${{ matrix.asset_glob }}
            target/${{ matrix.target }}/release/bundle/*/*.sig

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            ${{ matrix.asset_glob }}
            target/${{ matrix.target }}/release/bundle/*/*.sig

  # ── Windows code-signing via SignPath (free for OSS) ─────────────────────
  # To activate:
  #   1. Apply at https://signpath.io/product/open-source (public repo required)
  #   2. Once approved, add repo secrets:
  #        SIGNPATH_API_TOKEN       – API token from SignPath dashboard
  #   3. Add repo variables:
  #        SIGNPATH_ORGANIZATION_ID – from SignPath dashboard
  #   4. Create artifact config "paintkiduakan-nsis" and signing policy
  #      "release-signing" in the SignPath dashboard pointing at the .exe
  # SignPath will re-upload a signed .exe to the release automatically.
  sign-windows:
    name: sign Windows installer (SignPath)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
    steps:
      - name: Submit signing request (x86_64)
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          signing-policy-slug: release-signing
          artifact-configuration-slug: paintkiduakan-nsis
          github-artifact-name: windows-x86_64
          wait-for-completion: true
          output-artifact-directory: signed-windows-x86_64

      - name: Submit signing request (aarch64)
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          signing-policy-slug: release-signing
          artifact-configuration-slug: paintkiduakan-nsis
          github-artifact-name: windows-aarch64
          wait-for-completion: true
          output-artifact-directory: signed-windows-aarch64

      - name: Upload signed installers to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            signed-windows-x86_64/**/*.exe
            signed-windows-aarch64/**/*.exe

  latest-json:
    name: publish latest.json
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          notes='Release notes here'
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          repo="${GITHUB_REPOSITORY}"
          release_url="https://github.com/${repo}/releases/download/${GITHUB_REF_NAME}"

          # upload-artifact@v4 preserves full workspace-relative paths, so we
          # search by filename (-name) rather than by flat path (-path).
          pick_one() {
            local artifact_dir="$1"
            local name_glob="$2"
            local file
            file="$(find "release-artifacts/$artifact_dir" -type f -name "$name_glob" | sort | head -n 1)"
            if [[ -z "$file" ]]; then
              echo "ERROR: no file matching '$name_glob' under release-artifacts/$artifact_dir" >&2
              find "release-artifacts/$artifact_dir" -type f >&2 || true
              exit 1
            fi
            printf '%s' "$file"
          }

          read_sig() {
            local file="$1"
            tr -d '\n' < "$file"
          }

          mac_aarch64_asset="$(pick_one 'macos-aarch64' '*.app.tar.gz')"
          mac_aarch64_sig="$(pick_one 'macos-aarch64' '*.app.tar.gz.sig')"
          mac_x86_64_asset="$(pick_one 'macos-x86_64' '*.app.tar.gz')"
          mac_x86_64_sig="$(pick_one 'macos-x86_64' '*.app.tar.gz.sig')"
          win_x64_asset="$(pick_one 'windows-x86_64' '*.exe')"
          win_x64_sig="$(pick_one 'windows-x86_64' '*.exe.sig')"
          win_arm64_asset="$(pick_one 'windows-aarch64' '*.exe')"
          win_arm64_sig="$(pick_one 'windows-aarch64' '*.exe.sig')"

          mac_aarch64_name="$(basename "$mac_aarch64_asset")"
          mac_x86_64_name="$(basename "$mac_x86_64_asset")"
          win_x64_name="$(basename "$win_x64_asset")"
          win_arm64_name="$(basename "$win_arm64_asset")"

          cat > latest.json <<EOF
          {
            "version": "${version}",
            "notes": "${notes}",
            "pub_date": "${pub_date}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$(read_sig "$mac_aarch64_sig")",
                "url": "${release_url}/${mac_aarch64_name}"
              },
              "darwin-x86_64": {
                "signature": "$(read_sig "$mac_x86_64_sig")",
                "url": "${release_url}/${mac_x86_64_name}"
              },
              "windows-x86_64": {
                "signature": "$(read_sig "$win_x64_sig")",
                "url": "${release_url}/${win_x64_name}"
              },
              "windows-aarch64": {
                "signature": "$(read_sig "$win_arm64_sig")",
                "url": "${release_url}/${win_arm64_name}"
              }
            }
          }
          EOF

      - name: Upload latest.json
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: latest.json
