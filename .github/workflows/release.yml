name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_glob: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_glob: target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_glob: target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ${{ matrix.asset_glob }}
            target/${{ matrix.target }}/release/bundle/*/*.sig

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            ${{ matrix.asset_glob }}
            target/${{ matrix.target }}/release/bundle/*/*.sig

  check-signing-key:
    name: check signing key
    runs-on: ubuntu-latest
    outputs:
      has-key: ${{ steps.check.outputs.has-key }}
    steps:
      - name: Check if signing key exists
        id: check
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: echo "has-key=${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

  latest-json:
    name: publish latest.json
    runs-on: ubuntu-latest
    needs: [build, check-signing-key]
    if: ${{ needs.check-signing-key.outputs.has-key == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          notes='Release notes here'
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          repo="${GITHUB_REPOSITORY}"
          release_url="https://github.com/${repo}/releases/download/${GITHUB_REF_NAME}"

          pick_one() {
            local pattern="$1"
            local file
            file="$(find release-artifacts -type f -path "$pattern" | sort | head -n 1)"
            if [[ -z "$file" ]]; then
              echo "missing artifact for pattern: $pattern" >&2
              exit 1
            fi
            printf '%s' "$file"
          }

          read_sig() {
            local file="$1"
            tr -d '\n' < "$file"
          }

          mac_aarch64_asset="$(pick_one 'release-artifacts/macos-aarch64/*.app.tar.gz')"
          mac_aarch64_sig="$(pick_one 'release-artifacts/macos-aarch64/*.app.tar.gz.sig')"
          mac_x86_64_asset="$(pick_one 'release-artifacts/macos-x86_64/*.app.tar.gz')"
          mac_x86_64_sig="$(pick_one 'release-artifacts/macos-x86_64/*.app.tar.gz.sig')"
          win_asset="$(pick_one 'release-artifacts/windows-x86_64/*.exe')"
          win_sig="$(pick_one 'release-artifacts/windows-x86_64/*.exe.sig')"

          mac_aarch64_name="$(basename "$mac_aarch64_asset")"
          mac_x86_64_name="$(basename "$mac_x86_64_asset")"
          win_name="$(basename "$win_asset")"

          cat > latest.json <<EOF
          {
            "version": "${version}",
            "notes": "${notes}",
            "pub_date": "${pub_date}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$(read_sig "$mac_aarch64_sig")",
                "url": "${release_url}/${mac_aarch64_name}"
              },
              "darwin-x86_64": {
                "signature": "$(read_sig "$mac_x86_64_sig")",
                "url": "${release_url}/${mac_x86_64_name}"
              },
              "windows-x86_64": {
                "signature": "$(read_sig "$win_sig")",
                "url": "${release_url}/${win_name}"
              }
            }
          }
          EOF

      - name: Upload latest.json
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: latest.json
