name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            openssl_triplet: x64-windows-static
            asset_glob: target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            openssl_triplet: arm64-windows-static
            asset_glob: target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: windows-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_glob: target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_glob: target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify release version
        run: node scripts/check-release-version.cjs

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Setup ARM64 MSVC tools (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          choco install visualstudio2022-workload-vctools -y --params "--quiet --wait" 2>$null
          $vcInstallDir = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ($vcInstallDir) {
            $arm64Bin = Join-Path $vcInstallDir "VC\Tools\MSVC\*\bin\Hostx64\arm64"
            $arm64Path = Get-Item $arm64Bin | Select-Object -First 1 -ExpandProperty FullName
            if ($arm64Path) {
              echo "$arm64Path" >> $env:GITHUB_PATH
              Write-Host "Added ARM64 MSVC tools to PATH: $arm64Path"
            }
          }

      - name: Cache vcpkg binary packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-binary-cache
          key: vcpkg-${{ matrix.openssl_triplet }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-${{ matrix.openssl_triplet }}-

      - name: Install OpenSSL via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\vcpkg-binary-cache" | Out-Null
          $env:VCPKG_BINARY_SOURCES = "clear;files,$env:RUNNER_TEMP\vcpkg-binary-cache,readwrite"
          vcpkg install openssl:${{ matrix.openssl_triplet }}
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\${{ matrix.openssl_triplet }}" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: |
            ${{ matrix.asset_glob }}
            target/${{ matrix.target }}/release/bundle/*/*.sig

  # Ponytail: tauri-plugin-updater verifies the .sig via the pubkey in tauri.conf.json.
  # No external signing service, no re-sign job — the .sig produced by `tauri build` is
  # the one the updater verifies. Windows SmartScreen will warn on first install; that's
  # a UX trade-off, not a security one. See docs/WINDOWS_BUILD.md.
  latest-json:
    name: publish latest.json
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          notes='Release notes here'
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          pick() {
            local dir="$1" glob="$2"
            local f
            f="$(find "release-artifacts/$dir" -type f -name "$glob" | sort | head -n 1)"
            if [[ -z "$f" ]]; then
              echo "ERROR: no '$glob' under release-artifacts/$dir" >&2
              find "release-artifacts/$dir" -type f >&2 || true
              exit 1
            fi
            printf '%s' "$f"
          }

          read_sig() { tr -d '\n' < "$1"; }

          declare -A asset sig
          asset[macos-aarch64]="$(pick macos-aarch64 '*.app.tar.gz')"
          sig[macos-aarch64]="$(pick macos-aarch64 '*.app.tar.gz.sig')"
          asset[macos-x86_64]="$(pick macos-x86_64 '*.app.tar.gz')"
          sig[macos-x86_64]="$(pick macos-x86_64 '*.app.tar.gz.sig')"
          asset[windows-x86_64]="$(pick windows-x86_64 '*.exe')"
          sig[windows-x86_64]="$(pick windows-x86_64 '*.exe.sig')"
          asset[windows-aarch64]="$(pick windows-aarch64 '*.exe')"
          sig[windows-aarch64]="$(pick windows-aarch64 '*.exe.sig')"

          mkdir -p release-files
          for key in "${!asset[@]}"; do
            cp "${asset[$key]}" "release-files/$(basename "${asset[$key]}")"
            cp "${sig[$key]}"   "release-files/$(basename "${asset[$key]}").sig"
          done

          cat > latest.json <<EOF
          {
            "version": "${version}",
            "notes": "${notes}",
            "pub_date": "${pub_date}",
            "platforms": {
              "darwin-aarch64":  { "signature": "$(read_sig "${sig[macos-aarch64]}")",  "url": "${release_url}/$(basename "${asset[macos-aarch64]}")" },
              "darwin-x86_64":   { "signature": "$(read_sig "${sig[macos-x86_64]}")",   "url": "${release_url}/$(basename "${asset[macos-x86_64]}")" },
              "windows-x86_64":  { "signature": "$(read_sig "${sig[windows-x86_64]}")",  "url": "${release_url}/$(basename "${asset[windows-x86_64]}")" },
              "windows-aarch64": { "signature": "$(read_sig "${sig[windows-aarch64]}")", "url": "${release_url}/$(basename "${asset[windows-aarch64]}")" }
            }
          }
          EOF

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          echo "=== Uploading to release: $tag ==="
          if ! gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag does not exist, creating..."
            gh release create "$tag" --title "$tag" --notes "Release $tag" --target master
            echo "Release created."
          else
            echo "Release $tag already exists, uploading assets."
          fi
          ls -la release-files/
          gh release upload "$tag" latest.json release-files/* --clobber
          echo "=== Upload complete ==="

      - name: Verify updater pubkey matches published signatures
        continue-on-error: true
        run: python3 scripts/verify_updater_pubkey.py