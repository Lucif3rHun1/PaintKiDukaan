name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            openssl_triplet: x64-windows-static
            asset_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: windows-x86_64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            openssl_triplet: arm64-windows-static
            asset_glob: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
            artifact_name: windows-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            artifact_name: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Verify release version
        run: node scripts/check-release-version.cjs

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Setup ARM64 MSVC tools (Windows ARM64)
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          choco install visualstudio2022-workload-vctools -y --params "--quiet --wait" 2>$null
          $vcInstallDir = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ($vcInstallDir) {
            $arm64Bin = Join-Path $vcInstallDir "VC\Tools\MSVC\*\bin\Hostx64\arm64"
            $arm64Path = Get-Item $arm64Bin | Select-Object -First 1 -ExpandProperty FullName
            if ($arm64Path) {
              echo "$arm64Path" >> $env:GITHUB_PATH
              Write-Host "Added ARM64 MSVC tools to PATH: $arm64Path"
            }
          }

      - name: Cache vcpkg binary packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/vcpkg-binary-cache
          key: vcpkg-${{ matrix.openssl_triplet }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-${{ matrix.openssl_triplet }}-

      - name: Install OpenSSL via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\vcpkg-binary-cache" | Out-Null
          $env:VCPKG_BINARY_SOURCES = "clear;files,$env:RUNNER_TEMP\vcpkg-binary-cache,readwrite"
          vcpkg install openssl:${{ matrix.openssl_triplet }}
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\${{ matrix.openssl_triplet }}" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Pack macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          app_path="$(find "$bundle_dir" -maxdepth 1 -type d -name '*.app' | sort | head -n 1)"
          if [[ -z "$app_path" ]]; then
            echo "No .app bundle found under $bundle_dir" >&2
            find "$bundle_dir" -maxdepth 2 -print >&2 || true
            exit 1
          fi
          tar -C "$bundle_dir" -czf "$app_path.tar.gz" "$(basename "$app_path")"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.asset_glob }}

  # Ponytail: app uses a custom SHA-256 verified updater (commands::updater).
  # No minisign keypair ceremony. Release artifacts are the bundle outputs only.
  latest-json:
    name: publish latest.json
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate latest.json (SHA-256 verified)
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          notes='Release notes here'
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          pick() {
            local dir="$1" glob="$2"
            local f
            f="$(find "release-artifacts/$dir" -type f -name "$glob" | sort | head -n 1)"
            if [[ -z "$f" ]]; then
              echo "ERROR: no '$glob' under release-artifacts/$dir" >&2
              find "release-artifacts/$dir" -type f >&2 || true
              exit 1
            fi
            printf '%s' "$f"
          }

          declare -A asset
          asset[macos-aarch64]="$(pick macos-aarch64 '*.app.tar.gz')"
          asset[macos-x86_64]="$(pick macos-x86_64 '*.app.tar.gz')"
          asset[windows-x86_64]="$(pick windows-x86_64 '*.exe')"
          asset[windows-aarch64]="$(pick windows-aarch64 '*.exe')"

          mkdir -p release-files
          for key in "${!asset[@]}"; do
            cp "${asset[$key]}" "release-files/$(basename "${asset[$key]}")"
          done

          sha256() { sha256sum "$1" | awk '{print $1}'; }

          macos_aarch64_name="$(basename "${asset[macos-aarch64]}")"
          macos_aarch64_sha="$(sha256 "${asset[macos-aarch64]}")"
          macos_aarch64_size="$(stat -c%s "${asset[macos-aarch64]}" 2>/dev/null || stat -f%z "${asset[macos-aarch64]}")"
          macos_x86_64_name="$(basename "${asset[macos-x86_64]}")"
          macos_x86_64_sha="$(sha256 "${asset[macos-x86_64]}")"
          macos_x86_64_size="$(stat -c%s "${asset[macos-x86_64]}" 2>/dev/null || stat -f%z "${asset[macos-x86_64]}")"
          windows_x86_64_name="$(basename "${asset[windows-x86_64]}")"
          windows_x86_64_sha="$(sha256 "${asset[windows-x86_64]}")"
          windows_x86_64_size="$(stat -c%s "${asset[windows-x86_64]}" 2>/dev/null || stat -f%z "${asset[windows-x86_64]}")"
          windows_aarch64_name="$(basename "${asset[windows-aarch64]}")"
          windows_aarch64_sha="$(sha256 "${asset[windows-aarch64]}")"
          windows_aarch64_size="$(stat -c%s "${asset[windows-aarch64]}" 2>/dev/null || stat -f%z "${asset[windows-aarch64]}")"

          cat > latest.json <<EOF
          {
            "version": "${version}",
            "notes": "${notes}",
            "pub_date": "${pub_date}",
            "platforms": {
              "darwin-aarch64":  { "url": "${release_url}/${macos_aarch64_name}",   "sha256": "${macos_aarch64_sha}",   "size": ${macos_aarch64_size} },
              "darwin-x86_64":   { "url": "${release_url}/${macos_x86_64_name}",    "sha256": "${macos_x86_64_sha}",    "size": ${macos_x86_64_size} },
              "windows-x86_64":  { "url": "${release_url}/${windows_x86_64_name}",  "sha256": "${windows_x86_64_sha}",  "size": ${windows_x86_64_size} },
              "windows-aarch64": { "url": "${release_url}/${windows_aarch64_name}", "sha256": "${windows_aarch64_sha}", "size": ${windows_aarch64_size} }
            }
          }
          EOF

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          echo "=== Uploading to release: $tag ==="
          ls -la release-files/
          echo "--- Auth check ---"
          gh auth status 2>&1
          echo "--- Create release if missing ---"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag does not exist, creating via gh..."
            gh release create "$tag" --title "$tag" --notes "Release $tag" --target master 2>&1
            echo "After gh create, exit=$?"
          else
            echo "Release $tag already exists."
          fi
          echo "--- Verify release exists (API fallback) ---"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            echo "gh release view still fails; trying GitHub API directly"
            payload=$(printf '{"tag_name":"%s","name":"%s","body":"Release %s","target_commitish":"%s","draft":false,"prerelease":false}' "$tag" "$tag" "$tag" "$GITHUB_SHA")
            api_status=$(curl -sS -o /tmp/rel.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.github+json" \
              -d "$payload" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases")
            echo "API response status: $api_status"
            cat /tmp/rel.json | head -c 500
            echo ""
          fi
          echo "--- Upload assets ---"
          gh release upload "$tag" latest.json release-files/* --clobber 2>&1
          echo "=== Upload complete ==="
          echo "--- Final verification ---"
          gh release view "$tag" 2>&1 | head -20
