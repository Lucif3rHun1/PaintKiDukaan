<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaintKiDukaan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #18181b;
            color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo span { color: #a1a1aa; }
        .version {
            font-size: 13px;
            color: #71717a;
            margin-top: -16px;
        }
        .status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #27272a;
            border-top-color: #3f3f46;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-track {
            width: 240px;
            height: 4px;
            background: #27272a;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: #3f3f46;
            transition: width 0.2s;
        }
        .status-text {
            font-size: 14px;
            color: #a1a1aa;
        }
        .error-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .error-icon {
            width: 48px;
            height: 48px;
            background: #27272a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .error-text {
            font-size: 14px;
            color: #a1a1aa;
            text-align: center;
            max-width: 320px;
            line-height: 1.5;
        }
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        button {
            -webkit-app-region: no-drag;
            padding: 8px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-retry {
            background: #27272a;
            color: #fafafa;
        }
        .btn-retry:hover { background: #3f3f46; }
        .btn-quit {
            background: transparent;
            color: #71717a;
        }
        .btn-quit:hover { color: #a1a1aa; }
        .update-ready {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .update-ready-version {
            font-size: 16px;
            font-weight: 600;
            color: #fafafa;
        }
        .update-ready-text {
            font-size: 13px;
            color: #a1a1aa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">PaintKi<span>Dukaan</span></div>
        <div class="version">v<span id="version">...</span></div>
        <div class="status" id="status">
            <div class="spinner" id="spinner"></div>
            <div class="progress-track" id="progress-track" style="display:none">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="status-text" id="status-text">Checking for updates...</div>
        </div>
        <div class="error-container" id="error">
            <div class="error-icon">⚠</div>
            <div class="error-text" id="error-text"></div>
            <div class="buttons">
                <button class="btn-retry" onclick="window.__retry()">Retry</button>
                <button class="btn-quit" onclick="window.__quit()">Quit</button>
            </div>
        </div>
        <div class="update-ready" id="update-ready">
            <div class="update-ready-version" id="update-ready-version"></div>
            <div class="update-ready-text" id="update-ready-text">Installing update...</div>
            <div class="spinner" style="margin-top:12px"></div>
        </div>
    </div>
    <script>
        (function () {
            const $ = (id) => document.getElementById(id);
            const status = $('status'), text = $('status-text'), spinner = $('spinner');
            const track = $('progress-track'), bar = $('progress-bar');
            const error = $('error'), errText = $('error-text');
            const ready = $('update-ready'), readyVer = $('update-ready-version');
            let total = 0, downloaded = 0;

            const setStatus = (s) => (text.textContent = s);
            const setPct = (p) => (bar.style.width = Math.min(100, Math.max(0, p)) + '%');
            const showProgress = () => { spinner.style.display = 'none'; track.style.display = 'block'; };
            const showError = (msg) => { status.style.display = 'none'; ready.style.display = 'none'; error.style.display = 'flex'; errText.textContent = msg; };
            const showReady = (v) => { status.style.display = 'none'; error.style.display = 'none'; ready.style.display = 'flex'; readyVer.textContent = 'v' + v + ' ready'; };
            const listen = (name, fn) => window.__TAURI__?.event?.listen(name, fn).catch(() => {});
            const payload = (e) => e?.payload || e || {};

            window.__setVersion = (v) => ($('version').textContent = v);

            listen('tauri://update-available', (e) => {
                const p = payload(e);
                if (p.version) $('version').textContent = p.version;
                setStatus('Downloading...');
                showProgress();
                total = 0; downloaded = 0;
            });

            listen('tauri://update-progress', (e) => {
                const p = payload(e);
                if (typeof p.contentLength === 'number') total = p.contentLength;
                if (typeof p.chunkLength === 'number') downloaded += p.chunkLength;
                if (total > 0) { const pct = Math.round((downloaded / total) * 100); setPct(pct); setStatus('Downloading ' + pct + '%'); }
                else setStatus('Downloading...');
            });

            listen('tauri://update-downloaded', () => { setStatus('Verifying signature...'); setPct(100); });
            listen('tauri://update-installing', (e) => { showReady(payload(e).version || $('version').textContent || ''); });
            listen('tauri://update-installed', () => { $('update-ready-text').textContent = 'Ready to install'; });
            listen('tauri://update-error', (e) => { showError(payload(e).error || 'Update failed'); });

            window.__retry = async () => {
                error.style.display = 'none'; status.style.display = 'flex'; setStatus('Checking for updates...'); spinner.style.display = 'block'; track.style.display = 'none';
                try { await window.__TAURI_INTERNALS__.invoke('plugin:updater|check'); }
                catch (e) { showError(e?.message || 'Retry failed'); }
            };
            window.__quit = async () => {
                try { await window.__TAURI_INTERNALS__.invoke('plugin:process|exit', { code: 0 }); }
                catch (e) { console.error('quit failed:', e); }
            };
        })();
    </script>
</body>
</html>
